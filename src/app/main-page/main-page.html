<section id="main-page">
  <nav>
    <button class="main-page__logo-button" type="button" aria-label="Scroll to top" (click)="scrollToTop()">
      <img src="/assets/icons/logo_orange.svg" alt="" />
    </button>
  </nav>
  <div class="header-main-page">
    <div class="header-main-left">
      <div class="header-main-title">
        <h1>Collect Feedback,</h1>
        <h1>Unlock Ideas</h1>
      </div>
      <p class="header-main-copy">
        Create and share surveys in minutes - from team events to <br />
        workplace culture. Collect opinions, engage your audience, <br />
        and turn feedback into action.
      </p>
      <button class="button header-main-cta" type="button" routerLink="/create-survey">
        New survey <img src="/assets/icons/add_circle.svg" alt="" />
      </button>
    </div>
    <div class="header-main-right">
      <span class="main-page__notepad-symbol-wrapper">
        <img
          class="main-page__notepad-symbol main-page__notepad-symbol--default"
          src="/assets/icons/notepad_symbol_default.svg"
          alt="Notepad Symbol"
        />
        <img
          class="main-page__notepad-symbol main-page__notepad-symbol--hover"
          src="/assets/icons/notepad_symbol_hover.svg"
          alt="Notepad Symbol Hover"
        />
      </span>
    </div>
  </div>

  <app-main-page-surveys-overview />

  <footer class="legal-links legal-links--on-dark" aria-label="Legal links">
    <a class="legal-links__link" routerLink="/imprint">Imprint</a>
    <span class="legal-links__separator" aria-hidden="true">|</span>
    <a class="legal-links__link" routerLink="/privacy-policy">Privacy Policy</a>
  </footer>
</section>
